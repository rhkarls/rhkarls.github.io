<link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon-16x16.png" | absURL }}">
<link rel="manifest" href="{{ "site.webmanifest" | absURL }}">
<meta name="theme-color" content="#ffffff">

{{- if and .IsPage (or (eq .File.Path "page/about.md") (eq .File.Path "page/cv.md")) }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "@id": "{{ .Site.BaseURL }}#person",

  "jobTitle": "Senior Hydrologist and Consultant",
  "description": "Senior hydrologist and Python developer specialising in catchment hydrology, hydrological modelling, GIS, and open-source environmental data tools. Available for consulting on hydrology, environmental data analysis, and Python development.",

  "sameAs": [
    "https://github.com/rhkarls"
  ],
  "knowsAbout": [
    "Hydrology",
    "Catchment hydrology",
    "Hydrological modelling",
    "Meteorology",
    "GIS",
    "Python",
    "Environmental data analysis"
  ]
}
